; PlatformIO project for the stm32-card firmware.
;
; Board: ST Nucleo-L432KC (STM32L432KC, Cortex-M4 @ 80 MHz).
; Framework: stm32cube — pulls in CMSIS + STM32L4 HAL + USB device middleware.
;
; Build:   pio run
; Flash:   pio run --target upload     (uses on-board ST-Link)
; Monitor: pio device monitor          (USB-CDC virtual COM port @ 115200)

[env:nucleo_l432kc]
platform   = ststm32
board      = nucleo_l432kc
framework  = stm32cube
monitor_speed = 115200

; HAL_SMARTCARD_MODULE_ENABLED unlocks the SmartCard driver for USART1.
; HAL_UART_MODULE_ENABLED unlocks plain UART for USART2 (host bridge via ST-Link VCP).
; USB defines are intentionally absent — the L432KC's native USB pins (PA11/PA12)
; aren't connected to anything on the Nucleo-L432KC PCB. We bridge to the host
; through USART2 instead.
build_flags =
    -DHAL_SMARTCARD_MODULE_ENABLED
    -DHAL_UART_MODULE_ENABLED
    -DSTM32L432xx
    -Iinclude
    -IInc
    -Isrc

; Source layout: keep firmware C in src/ and shared headers in Inc/.
build_src_filter = +<*>
